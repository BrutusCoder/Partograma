# =============================================================================
# Dependabot — atualização automática de dependências
# Monitora: GitHub Actions, pacotes npm (todos os workspaces), Docker
# Frequência: semanal (segunda-feira, 03:00 UTC)
# =============================================================================

version: 2

updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions — mantém as actions nos workflows sempre atualizadas
  # ---------------------------------------------------------------------------
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'America/Sao_Paulo'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci(deps)'

  # ---------------------------------------------------------------------------
  # npm — pacotes raiz do monorepo (devDependencies compartilhadas)
  # ---------------------------------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'America/Sao_Paulo'
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'chore(deps)'
    # Agrupa atualizações de patch/minor para reduzir PRs
    groups:
      production-deps:
        dependency-type: 'production'
        update-types: ['minor', 'patch']
      dev-deps:
        dependency-type: 'development'
        update-types: ['minor', 'patch']

  # ---------------------------------------------------------------------------
  # npm — @partograma/api (NestJS)
  # ---------------------------------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:30'
      timezone: 'America/Sao_Paulo'
    labels:
      - 'dependencies'
      - 'api'
    commit-message:
      prefix: 'chore(deps/api)'
    groups:
      nestjs:
        patterns: ['@nestjs/*']
        update-types: ['minor', 'patch']
      typeorm:
        patterns: ['typeorm', '@nestjs/typeorm']
        update-types: ['minor', 'patch']

  # ---------------------------------------------------------------------------
  # npm — @partograma/web (Next.js)
  # ---------------------------------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'America/Sao_Paulo'
    labels:
      - 'dependencies'
      - 'web'
    commit-message:
      prefix: 'chore(deps/web)'
    groups:
      nextjs:
        patterns: ['next', '@next/*']
        update-types: ['minor', 'patch']
      react:
        patterns: ['react', 'react-dom', '@types/react*']
        update-types: ['minor', 'patch']

  # ---------------------------------------------------------------------------
  # npm — @partograma/domain
  # ---------------------------------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/libs/domain'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'America/Sao_Paulo'
    labels:
      - 'dependencies'
      - 'libs'
    commit-message:
      prefix: 'chore(deps/domain)'

  # ---------------------------------------------------------------------------
  # npm — @partograma/validators
  # ---------------------------------------------------------------------------
  - package-ecosystem: 'npm'
    directory: '/libs/validators'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'America/Sao_Paulo'
    labels:
      - 'dependencies'
      - 'libs'
    commit-message:
      prefix: 'chore(deps/validators)'

  # ---------------------------------------------------------------------------
  # Docker — atualiza a imagem base node:22-alpine nos Dockerfiles
  # ---------------------------------------------------------------------------
  - package-ecosystem: 'docker'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'America/Sao_Paulo'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore(deps/docker)'

  - package-ecosystem: 'docker'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
      timezone: 'America/Sao_Paulo'
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'chore(deps/docker)'
